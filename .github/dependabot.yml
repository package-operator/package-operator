version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - '/'
      - '/apis'
      - '/pkg'
    schedule:
      interval: daily
    allow:
      - dependency-type: all
        dependency-name: "*"
    reviewers:
      - weherdh
    open-pull-requests-limit: 100
    groups:
      kube:
        applies-to: version-updates
        patterns:
          - k8s.io/*
      golangx:
        applies-to: version-updates
        patterns:
          - golang.org/x/*
      cardboard:
        applies-to: version-updates
        patterns:
          - pkg.package-operator.run
          - pkg.package-operator.run/cardboard/*
      googlegolang:
        applies-to: version-updates
        patterns:
          - google.golang.org/*
      githubcom:
        applies-to: version-updates
        patterns:
          - github.com/*
      sigsk8s:
        applies-to: version-updates
        patterns:
          - sigs.k8s.io/*
      opentelemetry:
        applies-to: version-updates
        patterns:
          - go.opentelemetry.io/*
    commit-message:
      prefix: "build(deps)"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    reviewers:
      - package-operator/core-maintainers/dependency-maintainers
    open-pull-requests-limit: 100
    commit-message:
      prefix: "build(deps)"